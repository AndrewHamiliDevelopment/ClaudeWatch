appId: com.zkidzdev.claudewatch
productName: ClaudeWatch
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc,tsconfig*.json,vitest.config.*}'
  - '!{*.md,*.txt}'
afterPack: scripts/afterSign.js
mac:
  artifactName: '${name}-${version}-${arch}.${ext}'
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extraFiles:
    - from: build/widget/ClaudeWatchWidgetExtension.appex
      to: PlugIns/ClaudeWatchWidgetExtension.appex
  extraResources:
    - from: resources/sounds
      to: sounds
win:
  artifactName: '${name}-${version}-setup.${ext}'
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  artifactName: '${name}-${version}-${arch}.${ext}'
  target:
    - AppImage
  category: Utility
publish:
  provider: github
  owner: theangeloumali
  repo: ClaudeWatch
  releaseType: release
